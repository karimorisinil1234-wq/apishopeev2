kind = "web"
previewPath = "/"
title = "Shopee Phone Checker"
version = "1.0.0"
id = "artifacts/shopee-checker-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19065

[services.development]
run = "pnpm --filter @workspace/shopee-checker-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shopee-checker-ui", "run", "build" ]
publicDir = "artifacts/shopee-checker-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19065"
BASE_PATH = "/"
