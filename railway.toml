[build]
builder = "nixpacks"
buildCommand = "cd artifacts/shopee-checker && pip install -r requirements.txt"

[deploy]
startCommand = "cd artifacts/shopee-checker && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
